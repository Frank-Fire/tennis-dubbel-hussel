<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎾 DubbelMaker</title>

<meta name="theme-color" content="#1B5E20">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

    <h1>🎾 DubbelMaker</h1>

</header>

<main>

<!-- HOME -->

<section id="home" class="page active">

    <button id="btnPlay" class="menuButton">
        🎾 Nieuwe speelavond
    </button>

    <button id="btnPlayers" class="menuButton">
        👥 Spelers beheren
    </button>

    <button id="btnSettings" class="menuButton">
        ⚙️ Instellingen
    </button>

</section>

<!-- SPELERS -->

<section id="players" class="page">

    <h2>Spelers</h2>

    <div id="playersList"></div>

    <div class="row">

        <input
            id="playerName"
            placeholder="Nieuwe speler">

        <button id="addPlayer">
            ➕
        </button>

    </div>

    <button class="backButton" data-home>
        ⬅ Home
    </button>

</section>

<!-- SPEELAVOND -->

<section id="session" class="page">

    <h2>Aanwezigen</h2>

    <div id="attendanceList"></div>

    <h2>Aantal banen</h2>

    <select id="courtCount">

        <option value="1">1 baan</option>
        <option value="2">2 banen</option>
        <option value="3">3 banen</option>
        <option value="4">4 banen</option>

    </select>

    <button id="generateTeams" class="menuButton">

        🎲 Maak teams

    </button>

    <button class="backButton" data-home>

        ⬅ Home

    </button>

</section>

<!-- UITSLAG -->

<section id="result" class="page">

    <h2>Teamindeling</h2>

    <div id="matchesContainer"></div>

    <button id="shareWhatsApp"
            class="menuButton">

        📲 Deel via WhatsApp

    </button>

    <button id="nextRound"
            class="menuButton">

        🔄 Nieuwe ronde

    </button>

    <button class="backButton"
            data-home>

        🏠 Home

    </button>

</section>

<!-- INSTELLINGEN -->

<section id="settings" class="page">

    <h2>Instellingen</h2>

    <p>

        Deze pagina wordt later uitgebreid.

    </p>

    <button class="backButton"
            data-home>

        ⬅ Home

    </button>

</section>

</main>

<script src="storage.js"></script>
<script src="players.js"></script>
<script src="matches.js"></script>
<script src="app.js"></script>

</body>

</html>
